<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-[Inter] flex flex-col gap-16">
    <div class="px-16 h-16 bg-blue-600 flex flex-col justify-center text-white">
        <h1 class="text-xl font-bold">Running Activity Tracker</h1>
    </div>
    <section class="flex flex-col gap-4 px-16">
        <h2 class="font-semibold">Record new run</h2>
        <form class="flex flex-col w-full" role="form" method="post" th:action="@{/runs}" th:object="${postRequest}">
            <div class="flex w-full justify-between gap-4">

                <div class="flex flex-col">
                    <label for="distance">Distance</label>
                    <input  id="distance" name="distance" type="number" step="0.01" th:field="*{distance}">
                </div>

                <div class="flex flex-col">
                    <label for="pace">Average Pace</label>
                    <input  id="pace" name="pace" type="number" step="0.01" th:field="*{averagePace}">
                </div>

                <div class="flex flex-col">
                    <label for="heart-rate">Average Heart Rate</label>
                    <input  id="heart-rate" name="heart-rate" type="number" th:field="*{averageHeartRate}">
                </div>

            </div>

            <button class="bg-blue-400 hover:bg-blue-500 rounded mt-4" type="submit">ADD RUN</button>
        </form>
    </section>
    <section class="flex flex-col gap-4 px-16">
        <h2 class="font-semibold">Previous runs</h2>
        <table class="text-sm w-full text-left">
            <thead class="text-xs">
            <tr class="border-b">
                <th>ID</th>
                <th>DISTANCE</th>
                <th>AVERAGE PACE</th>
                <th>AVERAGE HEART RATE</th>
                <th>CREATED AT</th>
                <th>UPDATED AT</th>
            </tr>
            </thead>
            <tbody th:each = "run : ${runs}">
                <tr class="hover:bg-gray-100">
                    <td class="py-2" th:text="${run.id}">text</td>
                    <td th:text="${run.distance}">text</td>
                    <td th:text="${run.averagePace}">text</td>
                    <td th:text="${run.averageHeartRate}">text</td>
                    <td th:text="${run.createdAt}">text</td>
                    <td th:text="${run.updatedAt}">text</td>
                    <td>
                        <form th:action="@{/runs/{id}(id=${run.id})}" method="post">
                            <input type="hidden" name="_method" value="delete" />
                            <button class="bg-red-300 hover:bg-red-400 rounded px-2" type="submit">DELETE</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>


</body>
</html>
